name: Build CC4060 Firmware

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SDK_ROOT: ${{ github.workspace }}

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug workspace
        run: |
          set -x
          echo "Workspace: ${{ github.workspace }}"
          ls -la ${{ github.workspace }}/
          echo "---"
          ls -lh ${{ github.workspace }}/pi32v2_toolchain.tar.gz 2>/dev/null || echo "TOOLCHAIN TARBALL MISSING"
          ls -lh ${{ github.workspace }}/sdk_ac692x.tar.gz 2>/dev/null || echo "SDK TARBALL MISSING"

      # Save our custom repo files before SDK extraction overwrites them
      - name: Save repo build files to /tmp
        run: |
          set -x
          mkdir -p /tmp/cc4060_build
          cp ${{ github.workspace }}/tools/rule.mk /tmp/cc4060_build/
          cp ${{ github.workspace }}/tools/cc4060_patch.py /tmp/cc4060_build/ 2>/dev/null || true
          cp ${{ github.workspace }}/tools/bfu_builder.py /tmp/cc4060_build/ 2>/dev/null || true
          ls -la /tmp/cc4060_build/

      # CRITICAL FIX #1: Install wine32 (isd_download.exe is 32-bit PE)
      - name: Install Wine (32-bit + 64-bit) and build tools
        run: |
          set -x
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq wine wine32 wine64 2>&1 | tail -5
          wine --version 2>/dev/null || echo "wine (32-bit) not available"
          wine64 --version 2>/dev/null || echo "wine64 not available"

          # Install LLVM tools (llvm-objcopy for ELF processing)
          sudo apt-get install -y -qq llvm 2>/dev/null || true
          llvm-objcopy --version 2>/dev/null || echo "llvm-objcopy not available"

      - name: Setup toolchain
        run: |
          set -x
          # CRITICAL: Tarball contains pi32v2/ and common/ as siblings.
          # pi32v2/bin/clang is a symlink -> ../../common/bin/clang
          # For this to resolve: pi32v2/bin -> ../../common/bin
          #   /opt/pi32/pi32v2/bin/clang -> ../../common/bin/clang = /opt/pi32/common/bin/clang ✓
          # So we must extract to /opt/pi32/ (NOT /opt/pi32/upstream/) to keep them as siblings.
          sudo mkdir -p /opt/pi32

          cd ${{ github.workspace }}
          echo "=== Tarball top-level entries ==="
          tar -tzf pi32v2_toolchain.tar.gz | grep -v '^\._' | grep -E '^[^/]+/?$' | sort -u
          echo "---"

          # Extract to /opt/pi32/ so pi32v2/ and common/ are siblings
          sudo tar xzf pi32v2_toolchain.tar.gz -C /opt/pi32/

          # Remove macOS AppleDouble ._ metadata files
          echo "=== Cleaning macOS metadata files ==="
          sudo find /opt/pi32 -name '._*' -type f -delete 2>/dev/null || true
          sudo find /opt/pi32 -name '._*' -type d -delete 2>/dev/null || true

          # Create 'upstream' symlink -> pi32v2 for compatibility with rest of workflow
          sudo ln -sf pi32v2 /opt/pi32/upstream
          echo "=== /opt/pi32/upstream -> pi32v2 ==="
          ls -la /opt/pi32/upstream

          echo "=== Toolchain layout ==="
          ls -la /opt/pi32/
          ls -la /opt/pi32/upstream/
          ls -la /opt/pi32/upstream/bin/ || echo "bin/ not found!"
          ls -la /opt/pi32/common/bin/ || echo "common/bin/ not found!"

          # Verify clang symlink resolves correctly
          echo "=== Verifying clang symlink chain ==="
          echo "pi32v2/bin/clang symlink target: $(readlink /opt/pi32/pi32v2/bin/clang 2>/dev/null || echo 'N/A')"
          echo "Resolved path: $(readlink -f /opt/pi32/upstream/bin/clang 2>/dev/null || echo 'N/A')"
          file /opt/pi32/common/bin/clang 2>/dev/null || echo "common/bin/clang NOT FOUND!"
          file /opt/pi32/upstream/bin/clang 2>/dev/null || echo "upstream/bin/clang NOT accessible!"

          # Show cc wrapper script contents
          echo "=== cc wrapper script ==="
          cat /opt/pi32/upstream/bin/cc 2>/dev/null || echo "cc not found"
          echo "=== cxx wrapper script ==="
          cat /opt/pi32/upstream/bin/cxx 2>/dev/null || echo "cxx not found"

          # Show Makefile.pi32_lto contents (to see CC definition)
          echo "=== Makefile.pi32_lto contents ==="
          cat ${{ github.workspace }}/tools/compiler/Makefile.pi32_lto 2>/dev/null || echo "Makefile.pi32_lto not found yet (SDK not extracted)"

          # Check for broken symlinks
          echo "=== Broken symlinks in toolchain ==="
          find /opt/pi32/upstream -xtype l 2>/dev/null || true

          # Create pi32-clang wrapper if it doesn't exist
          if [ ! -f /opt/pi32/upstream/bin/pi32-clang ] && [ ! -L /opt/pi32/upstream/bin/pi32-clang ]; then
            echo "=== Creating pi32-clang wrapper ==="
            if file /opt/pi32/upstream/bin/cc | grep -q "script\|text"; then
              echo "cc is a script, creating pi32-clang as copy of cc"
              sudo cp /opt/pi32/upstream/bin/cc /opt/pi32/upstream/bin/pi32-clang
              sudo chmod +x /opt/pi32/upstream/bin/pi32-clang
            else
              echo "cc is not a script, creating pi32-clang as symlink to cc"
              sudo ln -sf cc /opt/pi32/upstream/bin/pi32-clang
            fi
            ls -la /opt/pi32/upstream/bin/pi32-clang
          fi

          # Final verification: test that cc wrapper can find clang
          echo "=== Final toolchain verification ==="
          /opt/pi32/upstream/bin/cc --version 2>&1 || echo "cc --version failed (may need PATH setup)"
          find /opt/pi32 -type f -executable -not -name '._*' 2>/dev/null | sort

      - name: Extract SDK source
        run: |
          set -x
          cd ${{ github.workspace }}

          tar -tzf sdk_ac692x.tar.gz | head -20
          echo "---"

          mkdir -p /tmp/sdk_extract
          tar xzf sdk_ac692x.tar.gz -C /tmp/sdk_extract

          if [ -d "/tmp/sdk_extract/apps" ]; then
            SDK_SRC="/tmp/sdk_extract"
          else
            FIRST_DIR=$(ls /tmp/sdk_extract/ | head -1)
            SDK_SRC="/tmp/sdk_extract/$FIRST_DIR"
          fi

          if [ ! -d "$SDK_SRC/apps" ]; then
            echo "ERROR: apps/ not found in extracted SDK"
            ls -la $SDK_SRC/
            exit 1
          fi

          # Merge SDK into workspace (don't overwrite existing repo files)
          rsync -a --ignore-existing "$SDK_SRC/" ${{ github.workspace }}/

          echo "=== SDK layout ==="
          ls -la ${{ github.workspace }}/apps/ | head -20
          ls ${{ github.workspace }}/tools/ | head -10
          rm -rf /tmp/sdk_extract

      # Restore our custom files AND create symlink for compiler Makefile
      - name: Install build rules and create symlinks
        run: |
          set -x
          # Restore custom build files from /tmp
          mkdir -p ${{ github.workspace }}/tools
          cp /tmp/cc4060_build/rule.mk ${{ github.workspace }}/tools/rule.mk
          cp /tmp/cc4060_build/cc4060_patch.py ${{ github.workspace }}/tools/cc4060_patch.py 2>/dev/null || true
          cp /tmp/cc4060_build/bfu_builder.py ${{ github.workspace }}/tools/bfu_builder.py 2>/dev/null || true

          echo "=== rule.mk contents ==="
          cat ${{ github.workspace }}/tools/rule.mk

          # CRITICAL: apps/Makefile includes tools/compiler/Makefile.$(ARCH)
          # When running from apps/, this resolves to apps/tools/compiler/...
          # Create symlink so apps/tools -> repo_root/tools
          ln -sf ${{ github.workspace }}/tools ${{ github.workspace }}/apps/tools
          echo "=== Symlink created ==="
          ls -la ${{ github.workspace }}/apps/tools
          echo "=== Available compiler Makefiles ==="
          ls -la ${{ github.workspace }}/apps/tools/compiler/Makefile.pi32* 2>/dev/null || echo "No Makefile.pi32* found!"
          echo "=== Makefile.pi32 contents (non-LTO) ==="
          cat ${{ github.workspace }}/apps/tools/compiler/Makefile.pi32 2>/dev/null || echo "Makefile.pi32 NOT FOUND — build will fail!"
          echo "=== Makefile.pi32_lto contents (LTO, for reference) ==="
          cat ${{ github.workspace }}/apps/tools/compiler/Makefile.pi32_lto 2>/dev/null || echo "Makefile.pi32_lto not found"

      - name: Apply CC4060 UART bridge patch
        run: |
          set -x
          python3 tools/cc4060_patch.py ${{ github.workspace }}

          echo "=== Verify patches ==="
          grep -n "CC4060" ${{ github.workspace }}/apps/cpu/uart/uart.c | head -5
          grep -n "CC4060" ${{ github.workspace }}/apps/ble_stack/user/le_rcsp_module.c | head -5
          grep -n "CC4060" ${{ github.workspace }}/apps/include/sdk_cfg.h | head -5

      - name: Diagnose pre-compiled libraries
        run: |
          set -x
          cd ${{ github.workspace }}

          echo "=== Library files in include_lib/ ==="
          ls -la include_lib/*.a 2>/dev/null | head -20
          ls -la include_lib/**/*.a 2>/dev/null | head -20

          echo "=== bluetooth_lib.a details ==="
          file include_lib/bluetooth_lib.a 2>/dev/null || echo "bluetooth_lib.a not found at root"
          find . -name "bluetooth_lib.a" -type f 2>/dev/null | while read f; do
            echo "--- $f ---"
            ls -la "$f"
            file "$f"
            # Show first .o file format inside the archive
            /opt/pi32/upstream/bin/ar t "$f" 2>/dev/null | head -5 || echo "ar failed"
          done

          echo "=== Check object format inside bluetooth_lib.a ==="
          BT_LIB=$(find . -name "bluetooth_lib.a" -type f 2>/dev/null | head -1)
          if [ -n "$BT_LIB" ]; then
            # Extract one .o to check format
            cd $(dirname "$BT_LIB")
            /opt/pi32/upstream/bin/ar x $(basename "$BT_LIB") bigint_mul_core_bc51.o 2>/dev/null || true
            if [ -f bigint_mul_core_bc51.o ]; then
              file bigint_mul_core_bc51.o
              xxd bigint_mul_core_bc51.o | head -5
              ls -la bigint_mul_core_bc51.o
              rm -f bigint_mul_core_bc51.o
            fi
            cd ${{ github.workspace }}
          fi

          echo "=== Toolchain clang target info ==="
          /opt/pi32/upstream/bin/pi32-clang --version 2>&1 || true
          echo "---"
          # Check what format clang produces
          echo "int x;" > /tmp/test.c
          /opt/pi32/upstream/bin/pi32-clang -target pi32 -c /tmp/test.c -o /tmp/test.o 2>&1 || true
          file /tmp/test.o 2>/dev/null || echo "test.o not created"
          xxd /tmp/test.o 2>/dev/null | head -3 || true

      # CRITICAL: Correct build command with all platform variables
      # make -C apps uses apps/Makefile as entry point (has SRCS_C, LIBS, etc.)
      # We must pass platform variables from Makefile.br21 since we're not
      # invoking it directly — without these, OUTPUT_EXES is empty and nothing compiles!
      - name: Build firmware
        run: |
          set -x
          cd ${{ github.workspace }}

          echo "=== Build configuration ==="
          echo "Make version: $(make --version | head -1)"
          echo "Working dir: $(pwd)"
          echo "MAKE_RULE: ${{ github.workspace }}/tools/rule.mk"
          echo "Source files: $(grep -c '\.c \\' apps/Makefile) C files"

          # Verify symlink and compiler Makefile exist
          ls -la apps/tools/compiler/Makefile.pi32

          # Run make from apps/ directory with all required platform variables
          # These come from Makefile.br21 and are needed for OUTPUT_EXES, DIR_OUTPUT, etc.
          # NOTE: ARCH=pi32 (not pi32_lto) — pre-compiled libraries lack LTO bitcode,
          # so lto-wrapper rejects them. Non-LTO mode uses regular linker instead.
          make -C apps \
            HOST_OS=linux SLASH=/ \
            ARCH=pi32 \
            PLATFORM=br21 \
            TYPE=CHIP \
            NICKNAME=br21_sdk \
            LE_MODE=FULL_MODE \
            CODE_SPACE=flash \
            QLZ_TYPE=NULL \
            POST_BUILD_DIR=download/post_build/flash \
            DIR_OUTPUT=download/post_build/flash \
            EXES=sdk \
            OUTPUT_EXES=download/post_build/flash/sdk.exe \
            BUILD_LD=sdk.ld \
            BUILD_MAP=sdk.map \
            LINKER="-Tdownload/post_build/flash/sdk.ld -M=download/post_build/flash/sdk.map" \
            LIBS_PATH=libs \
            INCLUDE_LIB_PATH=../include_lib \
            MAKE_RULE=${{ github.workspace }}/tools/rule.mk \
            2>&1 | tail -500

          echo "=== Build output ==="
          ls -la apps/download/post_build/flash/ 2>/dev/null || echo "Output dir NOT FOUND"
          ls -la apps/download/post_build/flash/sdk.exe 2>/dev/null || echo "sdk.exe NOT FOUND"

          # CRITICAL: Verify sdk.exe is freshly built (not the 2019 pre-compiled one)
          if [ -f apps/download/post_build/flash/sdk.exe ]; then
            file apps/download/post_build/flash/sdk.exe
            stat apps/download/post_build/flash/sdk.exe
            # Check timestamp - should be today, not 2019
            EXE_DATE=$(stat -c%y apps/download/post_build/flash/sdk.exe 2>/dev/null || stat -f%m apps/download/post_build/flash/sdk.exe)
            echo "sdk.exe timestamp: $EXE_DATE"
            if echo "$EXE_DATE" | grep -q "2019"; then
              echo "ERROR: sdk.exe is still the 2019 pre-compiled version!"
              echo "The build did NOT recompile the source code."
              exit 1
            fi
          fi

      - name: Post-build objcopy
        run: |
          set -x
          OUTPUT_DIR=${{ github.workspace }}/apps/download/post_build/flash
          cd "$OUTPUT_DIR"

          echo "=== Checking sdk.exe ==="
          ls -la sdk.exe
          file sdk.exe

          # Try llvm-objcopy first, then toolchain's objcopy
          OBJCOPY=""
          if command -v llvm-objcopy &>/dev/null; then
            OBJCOPY="llvm-objcopy"
            echo "Using llvm-objcopy from system"
          else
            for candidate in /opt/pi32/upstream/bin/objcopy /opt/pi32/upstream/bin/pi32-objcopy; do
              if [ -x "$candidate" ]; then OBJCOPY="$candidate"; break; fi
            done
          fi

          if [ -n "$OBJCOPY" ]; then
            echo "Using objcopy: $OBJCOPY"
            $OBJCOPY -O binary -j .text  sdk.exe sdk.bin 2>&1 || true
            $OBJCOPY -O binary -j .data  sdk.exe data.bin 2>&1 || true
            $OBJCOPY -O binary -j .nvdata sdk.exe nvdata.bin 2>&1 || true
          else
            echo "No objcopy available, using Python ELF parser"
            python3 -c "
          import struct, sys

          def extract_elf_sections(filename):
              with open(filename, 'rb') as f:
                  data = f.read()
              if data[:4] != b'\x7fELF':
                  print('Not an ELF file!')
                  sys.exit(1)
              ei_class = data[4]
              if ei_class == 1:
                  e_shoff = struct.unpack_from('<I', data, 32)[0]
                  e_shentsize = struct.unpack_from('<H', data, 46)[0]
                  e_shnum = struct.unpack_from('<H', data, 48)[0]
                  e_shstrndx = struct.unpack_from('<H', data, 50)[0]
              else:
                  e_shoff = struct.unpack_from('<Q', data, 40)[0]
                  e_shentsize = struct.unpack_from('<H', data, 58)[0]
                  e_shnum = struct.unpack_from('<H', data, 60)[0]
                  e_shstrndx = struct.unpack_from('<H', data, 62)[0]
              sections = {}
              for i in range(e_shnum):
                  off = e_shoff + i * e_shentsize
                  if ei_class == 1:
                      sh_name = struct.unpack_from('<I', data, off)[0]
                      sh_offset = struct.unpack_from('<I', data, off+16)[0]
                      sh_size = struct.unpack_from('<I', data, off+20)[0]
                  else:
                      sh_name = struct.unpack_from('<I', data, off)[0]
                      sh_offset = struct.unpack_from('<Q', data, off+24)[0]
                      sh_size = struct.unpack_from('<Q', data, off+32)[0]
                  sections[i] = {'name_off': sh_name, 'offset': sh_offset, 'size': sh_size}
              strtab = sections[e_shstrndx]
              strtab_data = data[strtab['offset']:strtab['offset']+strtab['size']]
              result = {}
              for idx, sec in sections.items():
                  name_end = strtab_data.find(b'\x00', sec['name_off'])
                  name = strtab_data[sec['name_off']:name_end].decode('ascii', errors='replace')
                  if name in ('.text', '.data', '.nvdata'):
                      section_data = data[sec['offset']:sec['offset']+sec['size']]
                      result[name] = section_data
                      print(f'  {name}: {len(section_data)} bytes')
              return result

          sections = extract_elf_sections('sdk.exe')
          for name, data in sections.items():
              with open(name + '.bin', 'wb') as f:
                  f.write(data)
          print(f'Extracted: {list(sections.keys())}')
            "
          fi

          # Combine into sdk.app
          cat sdk.bin data.bin nvdata.bin > sdk.app 2>/dev/null || cat sdk.bin > sdk.app
          echo "sdk.app size: $(stat -c%s sdk.app) bytes"
          ls -la sdk.app sdk.bin data.bin nvdata.bin 2>/dev/null || true

      # CRITICAL FIX #3: Create uboot.boot and run isd_download.exe with wine (32-bit)
      - name: Generate firmware image with isd_download
        run: |
          set -x
          OUTPUT_DIR=${{ github.workspace }}/apps/download/post_build/flash
          cd "$OUTPUT_DIR"

          # Find isd_download.exe in SDK
          ISD_EXE=$(find ${{ github.workspace }} -name "isd_download.exe" -type f 2>/dev/null | head -1)

          if [ -z "$ISD_EXE" ] || [ ! -f "$ISD_EXE" ]; then
            echo "WARNING: isd_download.exe not found in SDK"
            echo "Falling back to sdk.app as firmware image"
            cp sdk.app jl_isd.bin
            exit 0
          fi

          echo "Using: $ISD_EXE"
          file "$ISD_EXE"

          # Find or create uboot.boot
          UBOOT_BIN=$(find ${{ github.workspace }} -name "uboot.bin" -type f 2>/dev/null | head -1)
          UBOOT_BOOT=$(find ${{ github.workspace }} -name "uboot.boot" -type f 2>/dev/null | head -1)

          if [ -z "$UBOOT_BOOT" ] && [ -n "$UBOOT_BIN" ]; then
            echo "Creating uboot.boot from uboot.bin"
            cp "$UBOOT_BIN" uboot.boot
            UBOOT_BOOT=uboot.boot
          fi

          if [ -z "$UBOOT_BOOT" ]; then
            echo "WARNING: uboot.boot/uboot.bin not found"
            echo "Trying isd_download without bootloader..."
          fi

          echo "uboot.boot: ${UBOOT_BOOT:-NOT FOUND}"

          # Find bt_cfg.bin
          BT_CFG=$(find ${{ github.workspace }} -name "bt_cfg.bin" -type f 2>/dev/null | head -1)
          echo "bt_cfg.bin: ${BT_CFG:-NOT FOUND}"

          # Build resource list
          RESOURCES=""
          for f in bt.mp3 music.mp3 linein.mp3 radio.mp3 connect.mp3 disconnect.mp3 \
                   ring.mp3 warning.mp3 power_off.mp3 0.mp3 1.mp3 2.mp3 3.mp3 4.mp3 \
                   5.mp3 6.mp3 7.mp3 8.mp3 9.mp3 start.mp3; do
            [ -f "$f" ] && RESOURCES="$RESOURCES $f"
          done
          echo "Resources: ${RESOURCES:-none}"

          # Initialize Wine (create prefix, suppress first-run dialogs)
          echo "=== Initializing Wine ==="
          WINEDEBUG=-all wineboot --init 2>/dev/null || true

          # Run isd_download.exe under Wine (32-bit)
          SUCCESS=0
          if [ -n "$UBOOT_BOOT" ]; then
            echo "=== Running isd_download.exe ==="
            WINEDEBUG=-all wine "$ISD_EXE" -tonorflash -dev br21 -boot 0x2000 -div6 -wait 300 \
              -format cfg -f "$UBOOT_BOOT" sdk.app bt_cfg.bin $RESOURCES 2>&1 && SUCCESS=1 || true
          fi

          if [ "$SUCCESS" -eq 0 ]; then
            echo "isd_download via Wine failed, trying without bootloader..."
            WINEDEBUG=-all wine "$ISD_EXE" -tonorflash -dev br21 -boot 0x2000 -div6 -wait 300 \
              sdk.app 2>&1 || true
          fi

          # Check for output files (isd_download.exe may produce various filenames)
          echo "=== Checking for firmware output ==="
          ls -la *.bin *.hex *.bfu *.img 2>/dev/null || echo "No firmware files found"

          # Find the output file (isd_download.exe typically produces jl_isd.bin or similar)
          if [ -f "jl_isd.bin" ]; then
            echo "Found jl_isd.bin"
          elif [ -f "isd_output.bin" ]; then
            cp isd_output.bin jl_isd.bin
            echo "Copied isd_output.bin -> jl_isd.bin"
          elif [ -f "firmware.bin" ]; then
            cp firmware.bin jl_isd.bin
            echo "Copied firmware.bin -> jl_isd.bin"
          else
            echo "isd_download did not produce expected output"
            echo "Falling back to sdk.app as firmware image"
            cp sdk.app jl_isd.bin
          fi

          echo "=== Firmware image ==="
          ls -la jl_isd.bin
          echo "jl_isd.bin size: $(stat -c%s jl_isd.bin) bytes"

      - name: Package BFU firmware
        run: |
          set -x
          OUTPUT_DIR=${{ github.workspace }}/apps/download/post_build/flash
          cd "$OUTPUT_DIR"

          if [ ! -f jl_isd.bin ]; then
            echo "ERROR: jl_isd.bin not found"
            ls -la
            exit 1
          fi

          BFU_BUILDER=${{ github.workspace }}/tools/bfu_builder.py

          python3 "$BFU_BUILDER" build jl_isd.bin updata.bfu 2>&1 || {
            echo "bfu_builder.py failed, using inline BFU creation..."
            python3 -c "
          import struct
          payload = open('jl_isd.bin','rb').read()
          hdr = bytearray(512)
          hdr[0:8] = b'JL_UDFIR'
          struct.pack_into('>I', hdr, 0x08, 0x20)
          struct.pack_into('>I', hdr, 0x0C, 0x000076C0)
          struct.pack_into('>I', hdr, 0x10, 0x200)
          struct.pack_into('>I', hdr, 0x14, len(payload))
          struct.pack_into('>I', hdr, 0x18, 0)
          hdr[0x24:0x30] = b'JL_692X.BIN\x00'
          with open('updata.bfu','wb') as f:
              f.write(hdr)
              f.write(payload)
          print(f'Inline BFU: {len(payload)} bytes payload')
            "
          }

          if [ ! -f updata.bfu ]; then
            echo "ERROR: Failed to create updata.bfu"
            exit 1
          fi

          echo "=== Final firmware ==="
          ls -la updata.bfu
          echo "BFU size: $(stat -c%s updata.bfu) bytes"
          echo "First 64 bytes (hex):"
          xxd -l 64 updata.bfu

          # Verify BFU
          python3 "$BFU_BUILDER" verify updata.bfu 2>&1 || true
          python3 "$BFU_BUILDER" info updata.bfu 2>&1 || true

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: updata-bfu
          path: ${{ github.workspace }}/apps/download/post_build/flash/updata.bfu
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ${{ github.workspace }}/apps/download/post_build/flash/sdk.map
            ${{ github.workspace }}/apps/download/post_build/flash/sdk.exe
            ${{ github.workspace }}/apps/download/post_build/flash/sdk.app
            ${{ github.workspace }}/apps/download/post_build/flash/jl_isd.bin
          retention-days: 7
