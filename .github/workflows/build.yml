name: Build CC4060 Firmware

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SDK_ROOT: ${{ github.workspace }}

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug workspace
        run: |
          set -x
          echo "Workspace: ${{ github.workspace }}"
          ls -la ${{ github.workspace }}/
          echo "---"
          # Check tarball existence and sizes
          ls -lh ${{ github.workspace }}/pi32v2_toolchain.tar.gz 2>/dev/null || echo "TOOLCHAIN TARBALL MISSING"
          ls -lh ${{ github.workspace }}/sdk_ac692x.tar.gz 2>/dev/null || echo "SDK TARBALL MISSING"
          file ${{ github.workspace }}/pi32v2_toolchain.tar.gz 2>/dev/null || true
          file ${{ github.workspace }}/sdk_ac692x.tar.gz 2>/dev/null || true

      - name: Save repo build files to /tmp
        run: |
          set -x
          mkdir -p /tmp/cc4060_build
          cp ${{ github.workspace }}/tools/rule.mk /tmp/cc4060_build/ 2>/dev/null || true
          cp ${{ github.workspace }}/tools/cc4060_patch.py /tmp/cc4060_build/ 2>/dev/null || true
          cp ${{ github.workspace }}/tools/bfu_builder.py /tmp/cc4060_build/ 2>/dev/null || true
          cp ${{ github.workspace }}/build.sh /tmp/cc4060_build/ 2>/dev/null || true
          ls -la /tmp/cc4060_build/

      - name: Install Wine for Windows tools
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq wine64 2>/dev/null || true
          wine64 --version || echo "Wine not available"

      - name: Setup toolchain
        run: |
          set -x
          sudo mkdir -p /opt/pi32/upstream
          
          # Extract toolchain
          cd ${{ github.workspace }}
          tar -tzf pi32v2_toolchain.tar.gz | head -20
          echo "---"
          sudo tar xzf pi32v2_toolchain.tar.gz -C /opt/pi32/upstream
          
          # Check if there's a top-level directory
          FIRST_DIR=$(tar -tzf pi32v2_toolchain.tar.gz | head -1 | cut -d/ -f1)
          echo "First directory in tarball: $FIRST_DIR"
          
          # If tarball has a top-level dir like pi32v2_toolchain/, move contents up
          if [ -d "/opt/pi32/upstream/$FIRST_DIR" ] && [ "$FIRST_DIR" != "bin" ] && [ "$FIRST_DIR" != "lib" ] && [ "$FIRST_DIR" != "include" ]; then
            echo "Moving contents of /opt/pi32/upstream/$FIRST_DIR/ up one level"
            sudo mv /opt/pi32/upstream/$FIRST_DIR/* /opt/pi32/upstream/ 2>/dev/null || true
            sudo mv /opt/pi32/upstream/$FIRST_DIR/.* /opt/pi32/upstream/ 2>/dev/null || true
            sudo rmdir /opt/pi32/upstream/$FIRST_DIR 2>/dev/null || true
          fi
          
          echo "=== Toolchain layout ==="
          ls -la /opt/pi32/upstream/
          ls -la /opt/pi32/upstream/bin/ || echo "bin/ not found!"
          
          echo "=== All toolchain binaries ==="
          find /opt/pi32 -type f -executable 2>/dev/null | sort
          
          file /opt/pi32/upstream/bin/clang 2>/dev/null || echo "clang not found!"
          file /opt/pi32/upstream/bin/pi32-clang 2>/dev/null || echo "pi32-clang not found!"

      - name: Extract SDK source
        run: |
          set -x
          cd ${{ github.workspace }}
          
          # Check tarball structure
          tar -tzf sdk_ac692x.tar.gz | head -20
          echo "---"
          
          # Extract to temp directory first
          mkdir -p /tmp/sdk_extract
          tar xzf sdk_ac692x.tar.gz -C /tmp/sdk_extract
          
          # Find the actual SDK root (might be flat or have a top-level dir)
          if [ -d "/tmp/sdk_extract/apps" ]; then
            SDK_SRC="/tmp/sdk_extract"
            echo "SDK extracted flat"
          else
            FIRST_DIR=$(ls /tmp/sdk_extract/ | head -1)
            SDK_SRC="/tmp/sdk_extract/$FIRST_DIR"
            echo "SDK in top-level dir: $FIRST_DIR"
          fi
          
          # Verify SDK source has apps/
          if [ ! -d "$SDK_SRC/apps" ]; then
            echo "ERROR: apps/ not found in extracted SDK"
            ls -la $SDK_SRC/
            exit 1
          fi
          
          # Copy SDK files to workspace (merge, don't overwrite existing files)
          # Use rsync to merge directories without overwriting repo files
          rsync -a --ignore-existing "$SDK_SRC/" ${{ github.workspace }}/
          
          echo "=== SDK layout ==="
          ls -la ${{ github.workspace }}/apps/ | head -20
          ls ${{ github.workspace }}/tools/ | head -10
          
          # Cleanup
          rm -rf /tmp/sdk_extract

      - name: Install build rules and restore repo files
        run: |
          set -x
          # Restore build files from /tmp backup (SDK extraction may have overwritten tools/)
          mkdir -p ${{ github.workspace }}/tools
          cp /tmp/cc4060_build/rule.mk ${{ github.workspace }}/tools/rule.mk
          cp /tmp/cc4060_build/cc4060_patch.py ${{ github.workspace }}/tools/cc4060_patch.py 2>/dev/null || true
          cp /tmp/cc4060_build/bfu_builder.py ${{ github.workspace }}/tools/bfu_builder.py 2>/dev/null || true
          cp /tmp/cc4060_build/build.sh ${{ github.workspace }}/build.sh 2>/dev/null || true
          echo "Build files restored"
          ls -la ${{ github.workspace }}/tools/rule.mk
          cat ${{ github.workspace }}/tools/rule.mk

      - name: Apply CC4060 UART bridge patch
        run: |
          set -x
          python3 tools/cc4060_patch.py ${{ github.workspace }}
          
          echo "=== Verify patches ==="
          grep -n "CC4060" ${{ github.workspace }}/apps/cpu/uart/uart.c | head -5
          grep -n "CC4060" ${{ github.workspace }}/apps/ble_stack/user/le_rcsp_module.c | head -5
          grep -n "CC4060" ${{ github.workspace }}/apps/include/sdk_cfg.h | head -5

      - name: Build firmware
        run: |
          set -x
          cd ${{ github.workspace }}
          
          echo "=== Starting build ==="
          echo "Make version: $(make --version | head -1)"
          echo "Working dir: $(pwd)"
          
          make HOST_OS=linux SLASH=/ \
            -f tools/platform/Makefile.br21 \
            2>&1 | tail -300
          
          echo "=== Build output ==="
          ls -la apps/download/post_build/flash/sdk.exe 2>/dev/null || echo "sdk.exe NOT FOUND"

      - name: Post-build objcopy
        run: |
          set -x
          OUTPUT_DIR=${{ github.workspace }}/apps/download/post_build/flash
          cd "$OUTPUT_DIR"
          
          echo "=== Checking sdk.exe ==="
          ls -la sdk.exe
          file sdk.exe
          
          # Find objcopy dynamically - could be at various paths depending on tarball structure
          OBJCOPY=""
          for candidate in \
            /opt/pi32/upstream/bin/objcopy \
            /opt/pi32/upstream/bin/pi32-objcopy \
            /opt/pi32/bin/objcopy \
            /opt/pi32/bin/pi32-objcopy; do
            if [ -x "$candidate" ]; then
              OBJCOPY="$candidate"
              break
            fi
          done
          
          # Fallback: search everywhere under /opt/pi32
          if [ -z "$OBJCOPY" ]; then
            OBJCOPY=$(find /opt/pi32 -name "*objcopy*" -type f 2>/dev/null | head -1)
          fi
          
          if [ -z "$OBJCOPY" ] || [ ! -x "$OBJCOPY" ]; then
            echo "ERROR: objcopy not found in toolchain!"
            echo "Toolchain contents:"
            find /opt/pi32 -type f 2>/dev/null | sort
            exit 1
          fi
          
          echo "Using objcopy: $OBJCOPY"
          file "$OBJCOPY"
          
          # Extract sections
          $OBJCOPY -O binary -j .text  sdk.exe sdk.bin 2>&1 || {
            echo "objcopy .text failed, trying alternative approach..."
            # Some objcopy versions need different flags for ELF64
            $OBJCOPY -O binary --only-section=.text sdk.exe sdk.bin
          }
          $OBJCOPY -O binary -j .data  sdk.exe data.bin 2>&1 || true
          $OBJCOPY -O binary -j .nvdata sdk.exe nvdata.bin 2>&1 || true
          
          # Combine into sdk.app
          cat sdk.bin data.bin nvdata.bin > sdk.app 2>/dev/null || cat sdk.bin > sdk.app
          echo "sdk.app size: $(stat -c%s sdk.app) bytes"
          ls -la sdk.app

      - name: Generate firmware image with isd_download
        run: |
          set -x
          OUTPUT_DIR=${{ github.workspace }}/apps/download/post_build/flash
          cd "$OUTPUT_DIR"
          
          # Find isd_download.exe in SDK
          ISD_EXE=$(find ${{ github.workspace }} -name "isd_download.exe" -type f 2>/dev/null | head -1)
          
          if [ -z "$ISD_EXE" ] || [ ! -f "$ISD_EXE" ]; then
            echo "WARNING: isd_download.exe not found in SDK"
            echo "Will use sdk.app directly for BFU packaging"
            cp sdk.app jl_isd.bin
            echo "jl_isd.bin (copy of sdk.app) size: $(stat -c%s jl_isd.bin) bytes"
            exit 0
          fi
          
          echo "Using: $ISD_EXE"
          file "$ISD_EXE"
          
          # Find uboot.boot
          UBOOT=$(find ${{ github.workspace }} -name "uboot.boot" -type f 2>/dev/null | head -1)
          echo "uboot.boot: ${UBOOT:-NOT FOUND}"
          
          # Build resource list
          RESOURCES=""
          for f in bt.mp3 music.mp3 linein.mp3 radio.mp3 connect.mp3 disconnect.mp3 \
                   ring.mp3 warning.mp3 power_off.mp3 0.mp3 1.mp3 2.mp3 3.mp3 4.mp3 \
                   5.mp3 6.mp3 7.mp3 8.mp3 9.mp3 start.mp3; do
            [ -f "$f" ] && RESOURCES="$RESOURCES $f"
          done
          echo "Resources: ${RESOURCES:-none}"
          
          # Try isd_download under Wine
          SUCCESS=0
          if [ -n "$UBOOT" ]; then
            wine64 "$ISD_EXE" -tonorflash -dev br21 -boot 0x2000 -div6 -wait 300 \
              -format cfg -f "$UBOOT" sdk.app bt_cfg.bin $RESOURCES 2>&1 && SUCCESS=1 || true
          fi
          
          if [ "$SUCCESS" -eq 0 ]; then
            echo "isd_download via Wine failed or not available"
            echo "Falling back to sdk.app as firmware image"
            cp sdk.app jl_isd.bin
          fi
          
          echo "=== Firmware image ==="
          ls -la jl_isd.bin
          echo "jl_isd.bin size: $(stat -c%s jl_isd.bin) bytes"

      - name: Package BFU firmware
        run: |
          set -x
          OUTPUT_DIR=${{ github.workspace }}/apps/download/post_build/flash
          cd "$OUTPUT_DIR"
          
          # Verify input exists
          if [ ! -f jl_isd.bin ]; then
            echo "ERROR: jl_isd.bin not found"
            ls -la
            exit 1
          fi
          
          BFU_BUILDER=${{ github.workspace }}/tools/bfu_builder.py
          
          if [ -f "$BFU_BUILDER" ]; then
            echo "Using bfu_builder.py"
            python3 "$BFU_BUILDER" build jl_isd.bin updata.bfu 2>&1 || {
              echo "bfu_builder.py build failed, trying inline BFU creation..."
              # Inline BFU creation: JL_UDFIR header + 512-byte header + payload
              python3 -c "
          import struct, sys
          payload = open('jl_isd.bin','rb').read()
          hdr = bytearray(512)
          hdr[0:8] = b'JL_UDFIR'
          struct.pack_into('<I', hdr, 8, 0xAE3A)   # device ID
          struct.pack_into('<I', hdr, 12, len(payload))
          struct.pack_into('<I', hdr, 16, 0)        # flags
          with open('updata.bfu','wb') as f:
              f.write(hdr)
              f.write(payload)
          print(f'Inline BFU: {len(payload)} bytes payload')
              "
            }
          else
            echo "bfu_builder.py not found, using inline BFU creation"
            python3 -c "
          import struct
          payload = open('jl_isd.bin','rb').read()
          hdr = bytearray(512)
          hdr[0:8] = b'JL_UDFIR'
          struct.pack_into('<I', hdr, 8, 0xAE3A)
          struct.pack_into('<I', hdr, 12, len(payload))
          struct.pack_into('<I', hdr, 16, 0)
          with open('updata.bfu','wb') as f:
              f.write(hdr)
              f.write(payload)
          print(f'Inline BFU: {len(payload)} bytes payload')
            "
          fi
          
          if [ ! -f updata.bfu ]; then
            echo "ERROR: Failed to create updata.bfu"
            exit 1
          fi
          
          echo "=== Final firmware ==="
          ls -la updata.bfu
          echo "BFU size: $(stat -c%s updata.bfu) bytes"
          xxd updata.bfu | head -5
          echo ""
          echo "First 16 bytes (hex):"
          xxd -l 16 updata.bfu

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: updata-bfu
          path: ${{ github.workspace }}/apps/download/post_build/flash/updata.bfu
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ${{ github.workspace }}/apps/download/post_build/flash/sdk.map
            ${{ github.workspace }}/apps/download/post_build/flash/sdk.exe
            ${{ github.workspace }}/apps/download/post_build/flash/sdk.app
          retention-days: 7
